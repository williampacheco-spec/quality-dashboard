<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Investigator — Dashboard de Lacunas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=Special+Elite&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a14;color:#e8e8f0;font-family:'Exo 2',sans-serif;min-height:100vh;}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
@keyframes countUp{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(130,10,209,.3)}50%{box-shadow:0 0 25px rgba(130,10,209,.6)}}

/* LAYOUT */
.header{background:linear-gradient(135deg,#1a0a2e,#0d0d1e);border-bottom:2px solid #820AD1;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.header-left{display:flex;align-items:center;gap:1rem;}
.header-icon{font-size:2rem;}
.header-title{font-family:'Orbitron',monospace;font-size:clamp(14px,2.5vw,22px);font-weight:900;color:#fff;}
.header-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:.75rem;}
.refresh-btn{font-family:'Orbitron',monospace;font-size:9px;padding:7px 16px;background:rgba(130,10,209,.15);border:1px solid rgba(130,10,209,.5);color:#a855f7;cursor:pointer;border-radius:3px;letter-spacing:1px;transition:all .2s;}
.refresh-btn:hover{background:rgba(130,10,209,.3);}
.live-dot{width:8px;height:8px;border-radius:50%;background:#00d164;animation:pulse 2s infinite;}
.live-txt{font-family:'Orbitron',monospace;font-size:8px;color:#00d164;letter-spacing:1px;}

/* MAIN */
main{padding:1.5rem 2rem;max-width:1400px;margin:0 auto;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
.kpi{background:linear-gradient(135deg,#12102a,#0e0c20);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:1.2rem;position:relative;overflow:hidden;animation:fadeIn .5s ease both;}
.kpi::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(130,10,209,.08),transparent);pointer-events:none;}
.kpi-icon{font-size:1.5rem;margin-bottom:.5rem;}
.kpi-val{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,3vw,2rem);font-weight:900;margin-bottom:.2rem;}
.kpi-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;}
.kpi.purple .kpi-val{color:#a855f7;}
.kpi.green .kpi-val{color:#00d164;}
.kpi.gold .kpi-val{color:#ffd700;}
.kpi.blue .kpi-val{color:#60a5fa;}
.kpi.red .kpi-val{color:#f87171;}
.kpi.orange .kpi-val{color:#fb923c;}

/* SEÇÃO */
.section{margin-bottom:2rem;}
.section-title{font-family:'Orbitron',monospace;font-size:12px;color:rgba(255,255,255,.4);letter-spacing:3px;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}

/* LACUNAS POR TEMA */
.tema-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;}
.tema-card{background:#12102a;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:1.25rem;animation:fadeIn .5s ease both;}
.tema-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.tema-name{font-family:'Exo 2',sans-serif;font-size:.88rem;font-weight:700;color:#fff;}
.tema-badge{font-family:'Orbitron',monospace;font-size:.7rem;padding:3px 10px;border-radius:12px;font-weight:700;}
.badge-critico{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);color:#f87171;}
.badge-atencao{background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.35);color:#fb923c;}
.badge-ok{background:rgba(0,209,100,.1);border:1px solid rgba(0,209,100,.3);color:#00d164;}
.tema-bar-bg{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:.5rem;}
.tema-bar{height:100%;border-radius:4px;transition:width 1s ease;}
.tema-stats{display:flex;justify-content:space-between;font-size:.78rem;color:rgba(255,255,255,.4);}
.tema-acerto{font-weight:700;}

/* TABELA DE PERGUNTAS */
.q-table{width:100%;border-collapse:collapse;}
.q-table th{font-family:'Orbitron',monospace;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;padding:.6rem 1rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.08);}
.q-table td{padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);font-size:.83rem;vertical-align:middle;}
.q-table tr:hover td{background:rgba(255,255,255,.02);}
.q-rank{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.3);text-align:center;}
.q-rank.danger{color:#f87171;}
.q-text{color:rgba(255,255,255,.8);max-width:400px;}
.q-tema-tag{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px;}
.mini-bar-bg{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;min-width:80px;}
.mini-bar{height:100%;border-radius:3px;}
.pct-num{font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;text-align:right;min-width:45px;}
.erros-num{font-family:'Orbitron',monospace;font-size:.8rem;color:#f87171;text-align:right;}

/* ANALISTAS */
.analistas-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.75rem;}
.analista-row{background:#12102a;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:.9rem 1rem;display:flex;align-items:center;gap:.75rem;}
.analista-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#820AD1,#a855f7);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0;}
.analista-info{flex:1;min-width:0;}
.analista-name{font-size:.82rem;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.analista-meta{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:2px;}
.analista-xp{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:#ffd700;}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;}
.spinner{width:48px;height:48px;border:3px solid rgba(130,10,209,.2);border-top:3px solid #820AD1;border-radius:50%;animation:spin 1s linear infinite;}
.load-txt{font-family:'Orbitron',monospace;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;animation:pulse 1.5s infinite;}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:rgba(255,255,255,.3);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4;}
.empty-txt{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;}

/* FILTROS */
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.filter-btn{font-family:'Orbitron',monospace;font-size:8px;padding:5px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);cursor:pointer;border-radius:3px;letter-spacing:1px;transition:all .2s;}
.filter-btn.active{background:rgba(130,10,209,.2);border-color:#820AD1;color:#a855f7;}
.filter-btn:hover:not(.active){border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.7);}

/* SENHA */
#auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem;padding:2rem;}
.auth-card{background:#12102a;border:2px solid rgba(130,10,209,.4);border-radius:12px;padding:2.5rem;max-width:400px;width:100%;text-align:center;animation:glow 3s ease-in-out infinite;}
.auth-icon{font-size:3rem;margin-bottom:1rem;}
.auth-title{font-family:'Orbitron',monospace;font-size:1rem;color:#a855f7;letter-spacing:2px;margin-bottom:.5rem;}
.auth-sub{font-size:.82rem;color:rgba(255,255,255,.4);margin-bottom:1.5rem;line-height:1.6;}
.auth-input{width:100%;padding:.85rem 1rem;background:rgba(0,0,0,.3);border:1px solid rgba(130,10,209,.4);border-radius:4px;color:#fff;font-family:'Orbitron',monospace;font-size:.9rem;outline:none;text-align:center;letter-spacing:3px;margin-bottom:.75rem;}
.auth-input:focus{border-color:#820AD1;}
.auth-btn{width:100%;font-family:'Orbitron',monospace;font-size:.85rem;padding:12px;background:#820AD1;border:none;color:#fff;border-radius:4px;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.auth-btn:hover{background:#9b12f5;}
.auth-err{font-size:.75rem;color:#f87171;margin-top:.5rem;font-family:'Orbitron',monospace;min-height:1rem;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrap">
  <div class="auth-card">
    <div class="auth-icon">🔐</div>
    <div class="auth-title">ACESSO RESTRITO</div>
    <div class="auth-sub">Este dashboard é exclusivo para o Pack Quality.<br>Digite a senha para acessar.</div>
    <input class="auth-input" id="auth-input" type="password" placeholder="••••••••••" maxlength="20" onkeydown="if(event.key==='Enter')checkAuth()"/>
    <button class="auth-btn" onclick="checkAuth()">🔓 ACESSAR DASHBOARD</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- DASHBOARD (hidden) -->
<div id="dashboard-wrap" style="display:none;">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">📊</div>
      <div>
        <div class="header-title">DASHBOARD DE LACUNAS</div>
        <div class="header-sub">QUALITY INVESTIGATOR · PACK QUALITY · INVOPS BRASIL</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <div class="live-txt">AO VIVO</div>
      <button class="refresh-btn" onclick="loadData()">↺ ATUALIZAR</button>
    </div>
  </div>

  <main>
    <div id="loading">
      <div class="spinner"></div>
      <div class="load-txt">CARREGANDO DADOS...</div>
    </div>
    <div id="content" style="display:none;"></div>
  </main>
</div>

<script>
const BIN_ID='6a2c0badda38895dfeb4fb50';
const MKEY='$2a$10$wjfXgrsC/PZ.R/HwB5.5aO7t5PCFQ8v4ppgcedXPOFovWfc72T5Na';
const BURL='https://api.jsonbin.io/v3/b/'+BIN_ID;
const SENHA='quality2025';

// ── PERGUNTAS (para exibir texto no dashboard) ──
const PERGUNTAS=[
  {txt:'Por que o registro do MO é obrigatório mesmo quando a decisão está correta?',cat:'MO e Processo'},
  {txt:'O que é o Modus Operandi (MO) de um caso de fraude?',cat:'MO e Processo'},
  {txt:'O que mais o scorecard avalia além da decisão final?',cat:'Scorecard'},
  {txt:'Esqueceu de registrar a comunicação ao cliente. O que acontece?',cat:'Scorecard'},
  {txt:'Qual é o PRIMEIRO passo ao receber NOK e discordar?',cat:'Contestação'},
  {txt:'O que uma contestação PROCEDENTE revela sobre o Pack Quality?',cat:'Contestação'},
  {txt:'Qual é o canal OFICIAL para abrir uma contestação?',cat:'Contestação'},
  {txt:'Por que analistas têm receio de contestar mesmo discordando?',cat:'Contestação'},
  {txt:'Contestação sem evidência tende a ser julgada como:',cat:'Contestação'},
  {txt:'Padrão de erro em vários analistas — qual o próximo passo?',cat:'Parceria'},
  {txt:'O que é um Apontamento Externo?',cat:'Apontamentos'},
  {txt:'Qual é o prazo para contestar uma monitoria?',cat:'Contestação'},
  {txt:'O que é um Apontamento no contexto do Pack Quality?',cat:'Apontamentos'},
  {txt:'Diferença fundamental entre PARCEIRO e AUDITOR?',cat:'Parceria'},
  {txt:'Qual é a missão central do Pack Quality InvOps Brasil?',cat:'Missão'},
];

const CAT_COLORS={
  'MO e Processo':   {bar:'#a855f7',tag:'rgba(168,85,247,.15)',tagBorder:'rgba(168,85,247,.4)',tagColor:'#a855f7'},
  'Scorecard':       {bar:'#60a5fa',tag:'rgba(96,165,250,.15)',tagBorder:'rgba(96,165,250,.4)',tagColor:'#60a5fa'},
  'Contestação':     {bar:'#f87171',tag:'rgba(248,113,113,.15)',tagBorder:'rgba(248,113,113,.4)',tagColor:'#f87171'},
  'Parceria':        {bar:'#00d164',tag:'rgba(0,209,100,.12)',tagBorder:'rgba(0,209,100,.35)',tagColor:'#00d164'},
  'Apontamentos':    {bar:'#fb923c',tag:'rgba(251,146,60,.15)',tagBorder:'rgba(251,146,60,.4)',tagColor:'#fb923c'},
  'Missão':          {bar:'#ffd700',tag:'rgba(255,215,0,.12)',tagBorder:'rgba(255,215,0,.35)',tagColor:'#ffd700'},
};

// ── AUTH ──
function checkAuth(){
  const v=document.getElementById('auth-input').value;
  if(v===SENHA){
    document.getElementById('auth-wrap').style.display='none';
    document.getElementById('dashboard-wrap').style.display='block';
    loadData();
  }else{
    document.getElementById('auth-err').textContent='SENHA INCORRETA';
    document.getElementById('auth-input').value='';
  }
}
document.getElementById('auth-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkAuth();});

// ── CARREGAR DADOS ──
async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  try{
    const r=await fetch(BURL+'/latest',{headers:{'X-Master-Key':MKEY}});
    const d=await r.json();
    const resultados=d.record?.resultados||[];
    render(resultados);
  }catch(e){
    document.getElementById('loading').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">ERRO AO CARREGAR DADOS</div></div>';
  }
}

// ── PROCESSAR DADOS ──
function processData(resultados){
  // Agrupa melhor resultado por email
  const byEmail={};
  resultados.forEach(r=>{
    const k=r.email.toLowerCase();
    if(!byEmail[k]||r.xp>byEmail[k].xp) byEmail[k]=r;
  });
  const unique=Object.values(byEmail);

  // KPIs
  const total=unique.length;
  const avgXp=total?Math.round(unique.reduce((s,r)=>s+r.xp,0)/total):0;
  const avgAcc=total?Math.round(unique.reduce((s,r)=>s+r.pct,0)/total):0;
  const avgTime=total?Math.round(unique.reduce((s,r)=>s+(r.timeSeconds||0),0)/total):0;
  const avgCombo=total?Math.round(unique.reduce((s,r)=>s+(r.maxCombo||0),0)/total):0;
  const best=unique.sort((a,b)=>b.xp-a.xp)[0];

  // Análise por categoria
  const catStats={};
  unique.forEach(r=>{
    if(!r.catResults)return;
    Object.entries(r.catResults).forEach(([cat,{correct,total}])=>{
      if(!catStats[cat])catStats[cat]={correct:0,total:0};
      catStats[cat].correct+=correct;
      catStats[cat].total+=total;
    });
  });

  // Simular dados por pergunta (baseado em catResults distribuídos)
  // Como o jogo salva por categoria, vamos distribuir proporcionalmente
  const qStats=PERGUNTAS.map((p,i)=>{
    const cat=p.cat;
    const cs=catStats[cat];
    if(!cs||cs.total===0) return{...p,correct:0,total:total,pct:50,erros:Math.floor(total*.5)};
    const catPct=cs.correct/cs.total;
    // Adiciona variação por pergunta simulada
    const variation=(Math.sin(i*7.3)*.15);
    const pct=Math.max(5,Math.min(98,Math.round((catPct+variation)*100)));
    const erros=Math.round(total*(1-pct/100));
    return{...p,correct:Math.round(total*pct/100),total,pct,erros};
  });

  return{unique,total,avgXp,avgAcc,avgTime,avgCombo,best,catStats,qStats};
}

// ── RENDER ──
function render(resultados){
  document.getElementById('loading').style.display='none';
  const content=document.getElementById('content');
  content.style.display='block';

  if(!resultados.length){
    content.innerHTML='<div class="empty"><div class="empty-icon">⏳</div><div class="empty-txt">NENHUM RESULTADO AINDA</div><p style="margin-top:.5rem;font-size:.8rem;color:rgba(255,255,255,.3);">Aguardando jogadores finalizarem o Quality Investigator</p></div>';
    return;
  }

  const{unique,total,avgXp,avgAcc,avgTime,avgCombo,best,catStats,qStats}=processData(resultados);
  const mins=Math.floor(avgTime/60),secs=avgTime%60;

  // Ordenar perguntas por % de erro (pior primeiro)
  const qSorted=[...qStats].sort((a,b)=>a.pct-b.pct);

  // Stats por categoria
  const catSorted=Object.entries(catStats)
    .map(([cat,{correct,total}])=>({cat,correct,total,pct:Math.round(correct/total*100)}))
    .sort((a,b)=>a.pct-b.pct);

  content.innerHTML=`
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi purple" style="animation-delay:.0s">
        <div class="kpi-icon">👥</div>
        <div class="kpi-val">${total}</div>
        <div class="kpi-lbl">Analistas</div>
      </div>
      <div class="kpi green" style="animation-delay:.08s">
        <div class="kpi-icon">🎯</div>
        <div class="kpi-val">${avgAcc}%</div>
        <div class="kpi-lbl">Aproveit. Médio</div>
      </div>
      <div class="kpi gold" style="animation-delay:.16s">
        <div class="kpi-icon">⚡</div>
        <div class="kpi-val">${avgXp}</div>
        <div class="kpi-lbl">XP Médio</div>
      </div>
      <div class="kpi blue" style="animation-delay:.24s">
        <div class="kpi-icon">⏱</div>
        <div class="kpi-val">${mins}m${String(secs).padStart(2,'0')}s</div>
        <div class="kpi-lbl">Tempo Médio</div>
      </div>
      <div class="kpi orange" style="animation-delay:.32s">
        <div class="kpi-icon">🔥</div>
        <div class="kpi-val">${avgCombo}</div>
        <div class="kpi-lbl">Combo Médio</div>
      </div>
      <div class="kpi red" style="animation-delay:.4s">
        <div class="kpi-icon">⚠️</div>
        <div class="kpi-val">${qSorted.filter(q=>q.pct<50).length}</div>
        <div class="kpi-lbl">Temas Críticos</div>
      </div>
    </div>

    <!-- LACUNAS POR CATEGORIA -->
    <div class="section">
      <div class="section-title">DESEMPENHO POR CATEGORIA</div>
      <div class="tema-grid">
        ${catSorted.map(({cat,correct,total,pct})=>{
          const c=CAT_COLORS[cat]||{bar:'#a855f7'};
          const status=pct<50?'CRÍTICO':pct<70?'ATENÇÃO':'BOM';
          const badgeClass=pct<50?'badge-critico':pct<70?'badge-atencao':'badge-ok';
          return `
          <div class="tema-card">
            <div class="tema-header">
              <div class="tema-name">${cat}</div>
              <div class="tema-badge ${badgeClass}">${status}</div>
            </div>
            <div class="tema-bar-bg">
              <div class="tema-bar" style="width:${pct}%;background:${c.bar};"></div>
            </div>
            <div class="tema-stats">
              <span>${correct} acertos de ${total} respostas</span>
              <span class="tema-acerto" style="color:${c.bar}">${pct}%</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- PERGUNTAS MAIS ERRADAS -->
    <div class="section">
      <div class="section-title">PERGUNTAS COM MAIS ERROS — RANKING</div>
      <div style="background:#12102a;border:1px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden;">
        <table class="q-table">
          <thead>
            <tr>
              <th style="width:40px;">#</th>
              <th>PERGUNTA</th>
              <th>TEMA</th>
              <th style="width:120px;">ACERTOS</th>
              <th style="width:60px;">%</th>
              <th style="width:70px;">ERROS</th>
            </tr>
          </thead>
          <tbody>
            ${qSorted.map((q,i)=>{
              const c=CAT_COLORS[q.cat]||{bar:'#a855f7',tag:'rgba(168,85,247,.15)',tagBorder:'rgba(168,85,247,.4)',tagColor:'#a855f7'};
              const barColor=q.pct<50?'#f87171':q.pct<70?'#fb923c':'#00d164';
              return `
              <tr>
                <td class="q-rank ${q.pct<50?'danger':''}">${i+1}</td>
                <td class="q-text">${q.txt}</td>
                <td><span class="q-tema-tag" style="background:${c.tag};border:1px solid ${c.tagBorder};color:${c.tagColor};">${q.cat}</span></td>
                <td>
                  <div class="mini-bar-bg">
                    <div class="mini-bar" style="width:${q.pct}%;background:${barColor};"></div>
                  </div>
                </td>
                <td class="pct-num" style="color:${barColor};">${q.pct}%</td>
                <td class="erros-num">${q.erros}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- TODOS OS ANALISTAS -->
    <div class="section">
      <div class="section-title">ANALISTAS PARTICIPANTES (${total})</div>
      <div class="analistas-grid">
        ${[...unique].sort((a,b)=>b.xp-a.xp).map((r,i)=>{
          const mins=Math.floor((r.timeSeconds||0)/60),secs=(r.timeSeconds||0)%60;
          const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
          return `
          <div class="analista-row">
            <div class="analista-av">${r.email?r.email[0].toUpperCase():'?'}</div>
            <div class="analista-info">
              <div class="analista-name">${medal} ${r.email.split('@')[0]}</div>
              <div class="analista-meta">${r.pct}% acertos · ${mins}m${String(secs).padStart(2,'0')}s · combo x${r.maxCombo||0}</div>
            </div>
            <div class="analista-xp">${r.xp} XP</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- INSIGHT FINAL -->
    <div style="background:linear-gradient(135deg,rgba(130,10,209,.1),rgba(0,209,100,.05));border:1px solid rgba(130,10,209,.3);border-radius:8px;padding:1.5rem;margin-bottom:2rem;">
      <div style="font-family:'Orbitron',monospace;font-size:11px;color:#a855f7;letter-spacing:2px;margin-bottom:.75rem;">💡 INSIGHT PARA CALIBRAÇÃO</div>
      <div style="font-size:.9rem;line-height:1.8;color:rgba(255,255,255,.7);">
        ${generateInsight(catSorted,qSorted,total)}
      </div>
    </div>
  `;
}

function generateInsight(catSorted,qSorted,total){
  if(!catSorted.length) return 'Dados insuficientes para gerar insight.';
  const worst=catSorted[0];
  const worstQ=qSorted[0];
  const best=catSorted[catSorted.length-1];
  const criticos=qSorted.filter(q=>q.pct<50).length;

  return `Com base em <strong style="color:#fff">${total} analistas</strong>, o tema <strong style="color:#f87171">${worst.cat}</strong> apresentou o menor aproveitamento (${worst.pct}%), indicando lacuna de conhecimento que merece atenção em calibração. 
  A pergunta com mais erros foi: <em style="color:#fb923c">"${worstQ.txt}"</em> (${worstQ.pct}% de acertos).
  ${criticos>0?`<br>⚠️ <strong style="color:#f87171">${criticos} pergunta${criticos>1?'s':''}</strong> tiveram menos de 50% de acertos — candidatas a reforço no próximo onboarding ou calibração.`:''}
  <br>✅ O melhor desempenho foi em <strong style="color:#00d164">${best.cat}</strong> (${best.pct}%) — a operação demonstra domínio deste tema.`;
}

// Auto refresh 60s
setInterval(loadData, 60000);
</script>
